<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/genizy/web-port@main/schoolboy-runaway/">
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>SchoolBoy Runaway | Menu Mode Unlocked</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico" />
    <link rel="stylesheet" href="TemplateData/style.css" />
  </head>
  <body>
    <div id="loading-text" style="color: black; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;">
      LOADING...
    </div>
    <div id="unity-container">
      <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
      </div>
    </div>
    <script>
      const loadingText = document.querySelector("#loading-text");
      let totalBytes = 315673804.8;
      let loadedBytes = 0;

      function formatSize(bytes) {
        if (bytes > 1024 * 1024 * 1024) return (bytes / (1024 * 1024 * 1024)).toFixed(2) + " GB";
        if (bytes > 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(2) + " MB";
        return (bytes / 1024).toFixed(2) + " KB";
      }

      async function fetchWithProgress(url) {
        const response = await fetch(url);
        const reader = response.body.getReader();
        let chunks = [];
        let received = 0;
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          received += value.length;
          loadedBytes += value.length;
          chunks.push(value);
          loadingText.textContent = `LOADING... ${formatSize(loadedBytes)} / ${formatSize(totalBytes)} (${((loadedBytes / totalBytes) * 100).toFixed(1)}%)`;
        }
        let fullBuffer = new Uint8Array(received);
        let offset = 0;
        for (let chunk of chunks) {
          fullBuffer.set(chunk, offset);
          offset += chunk.length;
        }
        return fullBuffer.buffer;
      }

      async function mergeFiles(parts) {
        const buffers = await Promise.all(parts.map(fetchWithProgress));
        return URL.createObjectURL(new Blob(buffers));
      }

      function getParts(file, count) {
        let parts = [];
        for (let i = 1; i <= count; i++) parts.push(file + ".part" + i);
        return parts;
      }

      (async () => {
        const dataParts = getParts("Build/schoolboy-runaway.data", 14);
        const wasmParts = getParts("Build/schoolboy-runaway.wasm", 2);
        const [dataUrl, wasmUrl] = await Promise.all([mergeFiles(dataParts), mergeFiles(wasmParts)]);

        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");

        var config = {
          dataUrl: dataUrl,
          frameworkUrl: "Build/schoolboy-runaway.framework.js",
          codeUrl: wasmUrl,
          streamingAssetsUrl: "StreamingAssets",
          companyName: "Linked Squad",
          productName: "SchoolBoy Runaway",
          productVersion: "0.500",
        };

        var script = document.createElement("script");
        script.src = "Build/schoolboy-runaway.loader.js";
        script.onload = () => {
          createUnityInstance(canvas, config, (progress) => {
            progressBarFull.style.width = 100 * progress + "%";
          })
          .then((unityInstance) => {
            loadingText.remove();
            loadingBar.style.display = "none";

            // --- CHEAT INJECTION LOGIC ---
            
            // 1. Force Local Storage immediately
            localStorage.setItem('EndingsFound', '5');
            localStorage.setItem('MenuUnlocked', 'true');
            localStorage.setItem('completed', 'true');

            // 2. The Hammer Loop: Sends unlock commands every 1.5 seconds for 15 seconds
            let count = 0;
            const unlocker = setInterval(() => {
              try {
                // Try all known Manager names for this port
                unityInstance.SendMessage('SaveManager', 'UnlockAllEndings');
                unityInstance.SendMessage('MenuManager', 'ShowCheatMenu');
                unityInstance.SendMessage('GameManager', 'UnlockAll');
                
                console.log("Unlock attempt " + count);
              } catch (e) {}

              count++;
              if (count > 10) clearInterval(unlocker);
            }, 1500);

          })
          .catch((message) => { alert(message); });
        };
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
